<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Device Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title svg {
            width: 24px;
            height: 24px;
            color: #667eea;
        }

        .network-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .info-item label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-item value {
            display: block;
            font-size: 1.1rem;
            color: #333;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .device-list {
            list-style: none;
        }

        .device-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .device-item:hover {
            background: #fff;
            border-color: #667eea;
            transform: translateX(4px);
        }

        .device-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .device-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .device-info {
            flex: 1;
        }

        .device-ip {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .device-mac {
            font-size: 0.9rem;
            color: #666;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
        }

        .device-status {
            padding: 6px 12px;
            background: #d4edda;
            color: #155724;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: #333;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat {
            flex: 1;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 4px;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }

            .actions {
                flex-direction: column;
            }

            .device-item {
                flex-direction: column;
                text-align: center;
            }

            .device-icon {
                margin-right: 0;
                margin-bottom: 12px;
            }

            .device-status {
                margin-top: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Network Device Scanner</h1>
            <p>Discover all devices connected to your network</p>
        </header>

        <div class="card">
            <div class="card-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                    <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                    <line x1="6" y1="6" x2="6.01" y2="6"></line>
                    <line x1="6" y1="18" x2="6.01" y2="18"></line>
                </svg>
                Your Network
            </div>
            <div class="network-info" id="networkInfo">
                <div class="info-item">
                    <label>Loading...</label>
                    <value>Please wait</value>
                </div>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="actions">
            <button class="btn btn-primary" id="scanBtn" onclick="scanDevices()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                Scan Network
            </button>
            <button class="btn btn-secondary" onclick="refreshPage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                Refresh
            </button>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat">
                <div class="stat-value" id="deviceCount">0</div>
                <div class="stat-label">Devices Found</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="networkRange">-</div>
                <div class="stat-label">Network Range</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                Connected Devices
            </div>
            <ul class="device-list" id="deviceList">
                <li class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                        <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                        <line x1="6" y1="6" x2="6.01" y2="6"></line>
                        <line x1="6" y1="18" x2="6.01" y2="18"></line>
                    </svg>
                    <h3>No devices scanned yet</h3>
                    <p>Click "Scan Network" to discover devices on your network</p>
                </li>
            </ul>
        </div>
    </div>

    <script>
        // Load network info on page load
        async function loadNetworkInfo() {
            try {
                const response = await fetch('/api/network-info');
                const networks = await response.json();

                if (networks.length > 0) {
                    const network = networks[0];
                    document.getElementById('networkInfo').innerHTML = `
                        <div class="info-item">
                            <label>Your IP Address</label>
                            <value>${network.ip}</value>
                        </div>
                        <div class="info-item">
                            <label>MAC Address</label>
                            <value>${network.mac}</value>
                        </div>
                        <div class="info-item">
                            <label>Interface</label>
                            <value>${network.interface}</value>
                        </div>
                        <div class="info-item">
                            <label>Netmask</label>
                            <value>${network.netmask}</value>
                        </div>
                    `;

                    // Extract network range
                    const ipParts = network.ip.split('.');
                    document.getElementById('networkRange').textContent = `${ipParts[0]}.${ipParts[1]}.${ipParts[2]}.x`;
                }
            } catch (error) {
                console.error('Error loading network info:', error);
            }
        }

        async function scanDevices() {
            const btn = document.getElementById('scanBtn');
            const errorDiv = document.getElementById('errorMessage');

            btn.disabled = true;
            btn.innerHTML = `<div class="spinner"></div> Scanning...`;
            errorDiv.classList.remove('show');

            try {
                const response = await fetch('/api/devices');
                const data = await response.json();

                if (data.success) {
                    displayDevices(data.devices);
                    document.getElementById('deviceCount').textContent = data.count;
                    document.getElementById('stats').style.display = 'flex';
                } else {
                    throw new Error(data.error || 'Failed to scan devices');
                }
            } catch (error) {
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    Scan Network
                `;
            }
        }

        function displayDevices(devices) {
            const list = document.getElementById('deviceList');

            if (devices.length === 0) {
                list.innerHTML = `
                    <li class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                            <line x1="6" y1="6" x2="6.01" y2="6"></line>
                            <line x1="6" y1="18" x2="6.01" y2="18"></line>
                        </svg>
                        <h3>No devices found</h3>
                        <p>Try scanning again or check your network connection</p>
                    </li>
                `;
                return;
            }

            list.innerHTML = devices.map(device => `
                <li class="device-item">
                    <div class="device-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg>
                    </div>
                    <div class="device-info">
                        <div class="device-ip">${device.ip}</div>
                        <div class="device-mac">MAC: ${device.mac}</div>
                    </div>
                    <span class="device-status">${device.status}</span>
                </li>
            `).join('');
        }

        function refreshPage() {
            location.reload();
        }

        // Load network info when page loads
        loadNetworkInfo();
    </script>
</body>
</html>
